<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="t5 d5">
  <title id="t5">Build progress USB</title>
  <desc id="d5">A glossy USB drive inside a tri-color progress arc with a green completion node — the build pipeline made iconic.</desc>
  <defs>
    <linearGradient id="b5" x1="100" y1="60" x2="156" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5BC0FF"/><stop offset=".5" stop-color="#0F8FE5"/><stop offset="1" stop-color="#004B92"/>
    </linearGradient>
    <linearGradient id="g5" x1="128" y1="62" x2="128" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity=".55"/><stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="arc5" x1="36" y1="128" x2="220" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5BC0FF"/><stop offset=".55" stop-color="#0F8FE5"/><stop offset="1" stop-color="#107C10"/>
    </linearGradient>
    <linearGradient id="m5" x1="110" y1="196" x2="146" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#EAEEF2"/><stop offset="1" stop-color="#5A6068"/>
    </linearGradient>
    <filter id="s5" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/><feOffset dy="5"/>
      <feComponentTransfer><feFuncA type="linear" slope=".32"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g filter="url(#s5)">
    <circle cx="128" cy="128" r="100" fill="none" stroke="#0078D4" stroke-opacity=".14" stroke-width="20"/>
    <path d="M204 188A100 100 0 1 1 196 64" fill="none" stroke="url(#arc5)" stroke-width="20" stroke-linecap="round"/>
    <rect x="100" y="62" width="56" height="134" rx="14" fill="url(#b5)"/>
    <rect x="108" y="70" width="40" height="44" rx="8" fill="url(#g5)"/>
    <rect x="110" y="196" width="36" height="22" rx="5" fill="url(#m5)"/>
    <rect x="116" y="200" width="8" height="14" rx="2" fill="#D7A02A"/>
    <rect x="132" y="200" width="8" height="14" rx="2" fill="#D7A02A"/>
    <circle cx="204" cy="188" r="14" fill="#107C10" stroke="#FFFFFF" stroke-width="4"/>
    <rect x="100" y="62" width="56" height="134" rx="14" fill="none" stroke="#001E48" stroke-opacity=".25" stroke-width="2"/>
  </g>
</svg>