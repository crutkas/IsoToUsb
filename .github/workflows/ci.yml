name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET (pinned via global.json)
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Show .NET version
        run: dotnet --info

      - name: Restore
        run: |
          dotnet restore src/IsoToUsb/IsoToUsb.csproj -p:RuntimeIdentifier=win-x64
          dotnet restore tests/IsoToUsb.Tests/IsoToUsb.Tests.csproj -p:RuntimeIdentifier=win-x64

      - name: Build
        run: |
          dotnet build src/IsoToUsb/IsoToUsb.csproj -c Release -p:RuntimeIdentifier=win-x64 --no-restore
          dotnet build tests/IsoToUsb.Tests/IsoToUsb.Tests.csproj -c Release -p:RuntimeIdentifier=win-x64 --no-restore

      - name: Test
        run: dotnet test tests/IsoToUsb.Tests/IsoToUsb.Tests.csproj -c Release -p:RuntimeIdentifier=win-x64 --no-build --nologo

      - name: Publish (win-x64, NativeAOT, self-contained)
        run: dotnet publish src/IsoToUsb/IsoToUsb.csproj -c Release -p:PublishProfile=win-x64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: IsoToUsb-win-x64
          path: src/IsoToUsb/bin/Release/net10.0-windows10.0.26100.0/win-x64/publish/
          if-no-files-found: error
