<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="t2 d2">
  <title id="t2">Windows install USB</title>
  <desc id="d2">A vertical USB drive carrying the four-color Microsoft pane mark — the install-media icon.</desc>
