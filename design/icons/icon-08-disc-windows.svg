<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="icon08-title icon08-desc">
  <title id="icon08-title">ISO disc with embedded Windows pane</title>
  <desc id="icon08-desc">A Windows-oriented four-pane symbol sits inside an ISO disc to emphasize the source image.</desc>
  <defs>
    <linearGradient id="icon08-disc" x1="58" y1="52" x2="198" y2="204" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FBFBFB"/>
      <stop offset="1" stop-color="#DFF4FF"/>
    </linearGradient>
  </defs>
  <g stroke-linecap="round" stroke-linejoin="round">
    <circle cx="128" cy="128" r="84" fill="url(#icon08-disc)" stroke="#0078D4" stroke-width="18"/>
    <path d="M67 101Q128 61 189 101" fill="none" stroke="#0078D4" stroke-opacity="0.14" stroke-width="14"/>
    <rect x="88" y="88" width="34" height="34" rx="8" fill="#0078D4"/>
    <rect x="134" y="88" width="34" height="34" rx="8" fill="#0B83DA"/>
    <rect x="88" y="134" width="34" height="34" rx="8" fill="#0067C0"/>
    <rect x="134" y="134" width="34" height="34" rx="8" fill="#4CC2FF"/>
  </g>
