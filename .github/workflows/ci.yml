name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Build & test
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET (pinned via global.json)
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Show .NET version
        run: dotnet --info

      - name: Restore
        run: dotnet restore src/IsoToUsb/IsoToUsb.csproj

      - name: Build
        run: dotnet build src/IsoToUsb/IsoToUsb.csproj -c Release --no-restore

      - name: Build tests
        run: dotnet build src/IsoToUsb.Tests/IsoToUsb.Tests.csproj -c Release

      - name: Test
        run: dotnet test src/IsoToUsb.Tests/IsoToUsb.Tests.csproj -c Release --no-build --nologo

  publish:
    name: Publish (${{ matrix.rid }})
    needs: test
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        rid: [win-x64, win-arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET (pinned via global.json)
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Publish (${{ matrix.rid }}, self-contained, single-file Brotli)
        run: dotnet publish src/IsoToUsb/IsoToUsb.csproj -c Release -p:PublishProfile=${{ matrix.rid }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: IsoToUsb-${{ matrix.rid }}
          path: src/IsoToUsb/bin/Release/net10.0-windows10.0.26100.0/${{ matrix.rid }}/publish/
          if-no-files-found: error
